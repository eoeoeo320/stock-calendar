<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>주식 실현수익 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #16161d;
  --surface2: #1e1e28;
  --surface3: #262633;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #55556a;
  --accent: #4f8fff;
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.12);
  --green-border: rgba(62,207,142,0.3);
  --amber: #f5a623;
  --red: #ff5c5c;
  --red-dim: rgba(255,92,92,0.1);
  --red-border: rgba(255,92,92,0.25);
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
body { min-height: 100vh; padding: 20px 16px 60px; max-width: 1000px; margin: 0 auto; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 10px;
}
.app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-title span { color: var(--accent); }
.sync-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text3);
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); transition: background .3s;
}
.sync-dot.ok { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.err { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 15px;
}
.stat-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--text); }
.stat-value.ok { color: var(--green); }
.stat-value.warn { color: var(--amber); }
.s
