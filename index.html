<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>주식 실현수익 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface2: #f0f1f4;
  --surface3: #e4e6eb;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a2e;
  --text2: #555570;
  --text3: #9999b0;
  --accent: #2563eb;
  --green: #16a34a;
  --green-dim: rgba(22,163,74,0.08);
  --green-border: rgba(22,163,74,0.25);
  --amber: #d97706;
  --red: #dc2626;
  --red-dim: rgba(220,38,38,0.07);
  --red-border: rgba(220,38,38,0.2);
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
body { min-height: 100vh; padding: 20px 16px 60px; max-width: 1000px; margin: 0 auto; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 10px;
}
.app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-title span { color: var(--accent); }
.sync-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text3);
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); transition: background .3s;
}
.sync-dot.ok { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.err { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 15px;
}
.stat-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--text); }
.stat-value.ok { color: var(--green); }
.stat-value.warn { color: var(--amber); }
.stat-value.bad { color: var(--red); }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

.progress-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 16px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 14px;
}
.progress-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.progress-track { flex: 1; height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width .5s ease; }
.progress-pct { font-family: var(--mono); font-size: 12px; color: var(--text2); min-width: 50px; text-align: right; }

.cal-nav {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.cal-nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 7px 16px; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-family: var(--sans); transition: all .15s;
}
.cal-nav-btn:hover { background: var(--surface3); color: var(--text); }
.cal-month-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }

.cal-wrap { display: grid; grid-template-columns: repeat(7, 1fr) 160px; gap: 4px; }
.cal-header-cell {
  text-align: center; padding: 7px 4px; font-size: 11px;
  font-weight: 500; color: var(--text3); letter-spacing: 0.5px;
}
.cal-header-cell.sun { color: #e03e3e; }
.cal-header-cell.sat { color: #2563eb; }
.cal-week-summary-header {
  text-align: center; padding: 7px 4px; font-size: 11px; font-weight: 500; color: var(--text3);
}

.day-cell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 9px; min-height: 74px;
  display: flex; flex-direction: column; cursor: pointer;
  transition: border-color .15s, background .15s;
}
.day-cell:hover { border-color: var(--border2); background: var(--surface2); }
.day-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
.day-cell.today { border-color: var(--accent); border-width: 1.5px; }
.day-cell.pass { background: var(--green-dim); border-color: var(--green-border); }
.day-cell.pass:hover { background: rgba(22,163,74,0.13); }
.day-cell.dead { background: rgba(37,99,235,0.06); border-color: rgba(37,99,235,0.2); }
.day-cell.fail { background: var(--red-dim); border-color: var(--red-border); }

.day-num { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
.day-num.sun { color: #e03e3e; }
.day-num.sat { color: #2563eb; }
.day-num.today-dot::after {
  content: ''; display: inline-block; width: 5px; height: 5px;
  background: var(--accent); border-radius: 50%; margin-left: 5px; vertical-align: middle;
}
.day-profit { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
.day-status { margin-top: auto; font-size: 10px; }
.day-status.ok { color: var(--green); }
.day-status.mid { color: var(--accent); }
.day-status.bad { color: var(--red); }
.day-hint { font-size: 10px; color: var(--text3); margin-top: auto; }

.week-summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 11px;
  display: flex; flex-direction: column; gap: 6px;
}
.ws-total-label { font-size: 10px; color: var(--text3); }
.ws-total-val { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); }
.ws-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
.ws-bar-row { display: flex; align-items: center; gap: 5px; }
.ws-bar-label { font-size: 9px; color: var(--text3); min-width: 22px; }
.ws-bar-track { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.ws-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.ws-bar-fill.target { background: var(--green); }
.ws-bar-fill.dead { background: var(--accent); }
.ws-bar-fill.over { background: var(--amber); }
.ws-bar-pct { font-size: 9px; color: var(--text3); min-width: 26px; text-align: right; font-family: var(--mono); }
.ws-remain { font-size: 10px; color: var(--text3); }
.ws-remain.ok { color: var(--green); font-weight: 500; }

.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(2px); padding: 20px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 22px; width: 100%; max-width: 300px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.modal-sub { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
.modal-targets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.modal-target-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; }
.modal-target-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.modal-target-val { font-family: var(--mono); font-size: 12px; color: var(--text2); }
.modal input {
  width: 100%; padding: 11px 12px; font-size: 16px; font-family: var(--mono);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text); outline: none; margin-bottom: 6px;
}
.modal input:focus { border-color: var(--accent); }
.modal-hint { font-size: 10px; color: var(--text3); margin-bottom: 12px; }
.modal-preview {
  background: var(--surface2); border-radius: 8px; padding: 10px 12px;
  margin-bottom: 14px; min-height: 34px; display: flex; align-items: center;
}
.modal-preview-text { font-size: 12px; color: var(--text2); }
.modal-preview-text.ok { color: var(--green); }
.modal-preview-text.mid { color: var(--accent); }
.modal-preview-text.bad { color: var(--red); }
.modal-btns { display: flex; gap: 7px; }
.modal-btns button {
  flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); font-family: var(--sans); transition: all .15s;
}
.modal-btns button:hover { background: var(--surface3); color: var(--text); }
.modal-btns button.confirm { background: var(--accent); border-color: var(--accent); color: #fff; }
.modal-btns button.confirm:hover { background: #1d4ed8; }
.modal-btns button.delete { border-color: var(--red-border); color: var(--red); }
.modal-btns button.delete:hover { background: var(--red-dim); }

.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; gap: 14px;
}
.loading-spinner {
  width: 32px; height: 32px; border: 2px solid var(--surface3);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text3); }

.toast {
  position: fixed; bottom: 24px; right: 16px; z-index: 300;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 16px; font-size: 13px;
  color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  animation: toastIn .2s ease; pointer-events: none;
}
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

@media (max-width: 680px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .cal-wrap { grid-template-columns: repeat(7, 1fr); }
  .cal-week-summary-header, .week-summary { display: none; }
  .stat-value { font-size: 15px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<div class="app-header">
  <div class="app-title">📈 주식 실현수익 <span>캘린더</span></div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">연결 중...</span>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">월 누적</div>
    <div class="stat-value" id="s-monthly">0원</div>
    <div class="stat-sub" id="s-monthly-sub">이번 달</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">이번 주</div>
    <div class="stat-value" id="s-weekly">0원</div>
    <div class="stat-sub">주 목표 500만</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">주 목표 잔여</div>
    <div class="stat-value warn" id="s-week-remain">500만원</div>
    <div class="stat-sub">데드라인 300만</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">1억 잔여</div>
    <div class="stat-value bad" id="s-final">1억원</div>
    <div class="stat-sub" id="s-final-sub">누적 0원</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label">최종 목표 달성률</div>
  <div class="progress-track"><div class="progress-fill" id="pb" style="width:0%"></div></div>
  <div class="progress-pct" id="pb-pct">0.00%</div>
</div>

<div class="cal-nav">
  <button class="cal-nav-btn" onclick="changeMonth(-1)">← 이전달</button>
  <div class="cal-month-title" id="month-title"></div>
  <button class="cal-nav-btn" onclick="changeMonth(1)">다음달 →</button>
</div>

<div class="cal-wrap" id="cal-wrap"></div>

<script>
const SUPABASE_URL = 'https://eacvkiabkjxkguxbagnx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhY3ZraWFia2p4a2d1eGJhZ254Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTExMTUsImV4cCI6MjA5MjI2NzExNX0.Pyo7fWpmYZJ0gnAsDP44yaC__vM8Kj5pOyrZxYawEL0';

const GOAL_DAY = 1000000, DEAD_DAY = 200000;
const GOAL_WEEK = 5000000, DEAD_WEEK = 3000000;
const GOAL_FINAL = 100000000;

let data = {};
const today = new Date();
let curY = today.getFullYear(), curM = today.getMonth();

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...options.headers
    }
  });
  return res;
}

async function loadAll() {
  setSyncStatus('syncing', '불러오는 중...');
  try {
    const res = await sbFetch('profits?select=date,amount');
    if (!res.ok) throw new Error();
    const rows = await res.json();
    data = {};
    rows.forEach(r => { data[r.date] = r.amount; });
    setSyncStatus('ok', '동기화됨');
    return true;
  } catch(e) {
    setSyncStatus('err', '연결 실패');
    return false;
  }
}

async function upsertEntry(dateKey, amount) {
  setSyncStatus('syncing', '저장 중...');
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/profits', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ date: dateKey, amount })
    });
    if (!res.ok) { const t = await res.text(); console.error('upsert error:', res.status, t); throw new Error(); }
    setSyncStatus('ok', '저장됨');
    return true;
  } catch(e) {
    setSyncStatus('err', '저장 실패');
    return false;
  }
}

async function deleteEntry(dateKey) {
  setSyncStatus('syncing', '삭제 중...');
  try {
    const res = await sbFetch('profits?date=eq.' + dateKey, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    setSyncStatus('ok', '동기화됨');
    return true;
  } catch(e) {
    setSyncStatus('err', '삭제 실패');
    return false;
  }
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

function fmt(n, short = true) {
  if (!n) return '0원';
  if (short && n >= 100000000) return (n / 100000000).toFixed(2) + '억원';
  if (short && n >= 10000) return Math.round(n / 10000) + '만원';
  return n.toLocaleString() + '원';
}

function getWeekKey(dateStr) {
  const dt = new Date(dateStr);
  const day = dt.getDay() || 7;
  dt.setDate(dt.getDate() + 4 - day);
  const y = dt.getFullYear();
  const jan4 = new Date(y, 0, 4);
  return y + '-W' + Math.ceil(((dt - jan4) / 86400000 + 1) / 7);
}

function getTotal(filterFn) {
  return Object.entries(data).filter(([k]) => filterFn(k)).reduce((a, [, v]) => a + v, 0);
}
function getAllTotal() { return getTotal(() => true); }
function getMonthTotal(y, m) {
  const prefix = y + '-' + (m + 1).toString().padStart(2, '0');
  return getTotal(k => k.startsWith(prefix));
}
function getWeekTotal(wk) { return getTotal(k => getWeekKey(k) === wk); }

function renderStats() {
  const monthly = getMonthTotal(curY, curM);
  const todayWk = getWeekKey(today.toISOString().slice(0, 10));
  const weekly = getWeekTotal(todayWk);
  const allTime = getAllTotal();
  const remain = Math.max(0, GOAL_FINAL - allTime);
  const weekRemain = Math.max(0, GOAL_WEEK - weekly);
  const pct = Math.min(100, allTime / GOAL_FINAL * 100);

  const sm = document.getElementById('s-monthly');
  sm.textContent = fmt(monthly);
  sm.className = 'stat-value' + (monthly >= GOAL_WEEK ? ' ok' : '');

  const sw = document.getElementById('s-weekly');
  sw.textContent = fmt(weekly);
  sw.className = 'stat-value' + (weekly >= GOAL_WEEK ? ' ok' : weekly >= DEAD_WEEK ? ' warn' : ' bad');

  const swr = document.getElementById('s-week-remain');
  swr.textContent = weekRemain > 0 ? fmt(weekRemain) : '달성!';
  swr.className = 'stat-value' + (weekRemain === 0 ? ' ok' : weekly >= DEAD_WEEK ? ' warn' : ' bad');

  const sf = document.getElementById('s-final');
  sf.textContent = fmt(remain);
  sf.className = 'stat-value' + (allTime >= GOAL_FINAL ? ' ok' : allTime > 0 ? ' warn' : ' bad');
  document.getElementById('s-final-sub').textContent = '누적 ' + fmt(allTime);

  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('pb-pct').textContent = pct.toFixed(2) + '%';
}

function renderCalendar() {
  const wrap = document.getElementById('cal-wrap');
  wrap.innerHTML = '';

  const days7 = ['일', '월', '화', '수', '목', '금', '토'];
  days7.forEach((d, i) => {
    const h = document.createElement('div');
    h.className = 'cal-header-cell' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
    h.textContent = d;
    wrap.appendChild(h);
  });
  const sh = document.createElement('div');
  sh.className = 'cal-week-summary-header';
  sh.textContent = '주간 요약';
  wrap.appendChild(sh);

  const firstDay = new Date(curY, curM, 1).getDay();
  const daysInMonth = new Date(curY, curM + 1, 0).getDate();
  let cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

  weeks.forEach(week => {
    let weekTotal = 0, weekKey = null;

    week.forEach((d, wi) => {
      const cell = document.createElement('div');
      if (d === null) { cell.className = 'day-cell empty'; wrap.appendChild(cell); return; }

      const key = curY + '-' + (curM + 1).toString().padStart(2, '0') + '-' + d.toString().padStart(2, '0');
      if (!weekKey) weekKey = getWeekKey(key);
      const profit = data[key] || 0;
      weekTotal += profit;

      const isToday = new Date(curY, curM, d).toDateString() === today.toDateString();
      let cls = 'day-cell';
      if (profit > 0) cls += profit >= GOAL_DAY ? ' pass' : profit >= DEAD_DAY ? ' dead' : ' fail';
      if (isToday) cls += ' today';
      cell.className = cls;

      const numDiv = document.createElement('div');
      numDiv.className = 'day-num' + (wi === 0 ? ' sun' : wi === 6 ? ' sat' : '') + (isToday ? ' today-dot' : '');
      numDiv.textContent = d;
      cell.appendChild(numDiv);

      if (profit > 0) {
        const pDiv = document.createElement('div');
        pDiv.className = 'day-profit';
        pDiv.textContent = profit.toLocaleString() + '원';
        cell.appendChild(pDiv);

        const sDiv = document.createElement('div');
        if (profit >= GOAL_DAY) { sDiv.className = 'day-status ok'; sDiv.textContent = '목표달성 ✓'; }
        else if (profit >= DEAD_DAY) { sDiv.className = 'day-status mid'; sDiv.textContent = '데드라인 ↑'; }
        else { sDiv.className = 'day-status bad'; sDiv.textContent = '데드라인 ↓'; }
        cell.appendChild(sDiv);
      } else {
        const hint = document.createElement('div');
        hint.className = 'day-hint';
        hint.textContent = '탭하여 입력';
        cell.appendChild(hint);
      }

      cell.addEventListener('click', () => openModal(key, d));
      wrap.appendChild(cell);
    });

    const ws = document.createElement('div');
    ws.className = 'week-summary';
    const wkPct = Math.min(100, weekTotal / GOAL_WEEK * 100);
    const wkDPct = Math.min(100, weekTotal / DEAD_WEEK * 100);
    const wkRemain = Math.max(0, GOAL_WEEK - weekTotal);
    const fillCls = weekTotal >= GOAL_WEEK ? 'over' : 'target';
    ws.innerHTML = `
      <div>
        <div class="ws-total-label">주 누적 수익</div>
        <div class="ws-total-val">${fmt(weekTotal)}</div>
      </div>
      <div class="ws-bar-wrap">
        <div class="ws-bar-row">
          <div class="ws-bar-label">목표</div>
          <div class="ws-bar-track"><div class="ws-bar-fill ${fillCls}" style="width:${wkPct}%"></div></div>
          <div class="ws-bar-pct">${Math.round(wkPct)}%</div>
        </div>
        <div class="ws-bar-row">
          <div class="ws-bar-label">최소</div>
          <div class="ws-bar-track"><div class="ws-bar-fill dead" style="width:${wkDPct}%"></div></div>
          <div class="ws-bar-pct">${Math.round(wkDPct)}%</div>
        </div>
      </div>
      <div class="ws-remain ${wkRemain === 0 ? 'ok' : ''}">${wkRemain > 0 ? '잔여 ' + fmt(wkRemain) : '🎯 주목표 달성!'}</div>
    `;
    wrap.appendChild(ws);
  });

  renderStats();
  updateTitle();
}

function updateTitle() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-title').textContent = curY + '년 ' + months[curM];
}

let editingKey = null;
function openModal(key, d) {
  editingKey = key;
  const existing = data[key] || '';
  const [y, m] = key.split('-');
  const label = parseInt(m) + '월 ' + parseInt(key.split('-')[2]) + '일';

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-title">${label} 실현수익</div>
      <div class="modal-sub">금액 입력 후 저장</div>
      <div class="modal-targets">
        <div class="modal-target-card">
          <div class="modal-target-label">일 목표</div>
          <div class="modal-target-val">100만원↑</div>
        </div>
        <div class="modal-target-card">
          <div class="modal-target-label">일 데드라인</div>
          <div class="modal-target-val">20만원↑</div>
        </div>
      </div>
      <input type="number" id="profit-input" placeholder="예: 1500000" value="${existing}" step="10000" inputmode="numeric" />
      <div class="modal-hint">* 숫자만 입력 (단위: 원)</div>
      <div class="modal-preview" id="modal-preview">
        <span class="modal-preview-text" id="preview-text">${existing ? getPreviewText(Number(existing)) : '금액을 입력하세요'}</span>
      </div>
      <div class="modal-btns">
        ${existing ? '<button class="delete" onclick="handleDelete()">삭제</button>' : ''}
        <button onclick="closeModal()">취소</button>
        <button class="confirm" onclick="handleSave()">저장</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

  const input = document.getElementById('profit-input');
  setTimeout(() => input.focus(), 50);
  input.addEventListener('input', () => {
    const v = Number(input.value);
    const pt = document.getElementById('preview-text');
    if (!input.value) { pt.textContent = '금액을 입력하세요'; pt.className = 'modal-preview-text'; return; }
    pt.textContent = getPreviewText(v);
    pt.className = 'modal-preview-text ' + (v >= GOAL_DAY ? 'ok' : v >= DEAD_DAY ? 'mid' : 'bad');
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSave(); if (e.key === 'Escape') closeModal(); });
}

function getPreviewText(v) {
  if (!v) return '금액을 입력하세요';
  const f = v.toLocaleString() + '원';
  if (v >= GOAL_DAY) return f + ' → ✓ 일 목표 달성!';
  if (v >= DEAD_DAY) return f + ' → 데드라인 통과 (' + Math.round((GOAL_DAY - v) / 10000) + '만원 부족)';
  return f + ' → 데드라인 미달 (' + Math.round((DEAD_DAY - v) / 10000) + '만원 부족)';
}

function closeModal() {
  const b = document.getElementById('modal-backdrop');
  if (b) b.remove();
  editingKey = null;
}

async function handleSave() {
  const v = parseInt(document.getElementById('profit-input').value) || 0;
  if (v <= 0) { showToast('금액을 입력해주세요'); return; }
  const key = editingKey;
  closeModal();
  data[key] = v;
  renderCalendar();
  const ok = await upsertEntry(key, v);
  showToast(ok ? '저장되었습니다' : '저장 실패 — 다시 시도해주세요');
}
async function handleDelete() {
  const key = editingKey;
  closeModal();
  delete data[key];
  renderCalendar();
  const ok = await deleteEntry(key);
  showToast(ok ? '삭제되었습니다' : '삭제 실패');
}

function changeMonth(dir) {
  curM += dir;
  if (curM > 11) { curM = 0; curY++; }
  if (curM < 0) { curM = 11; curY--; }
  renderCalendar();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.style.opacity = '0', 2200);
  setTimeout(() => t.remove(), 2500);
}

async function init() {
  try {
    await Promise.race([
      loadAll(),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 6000))
    ]);
  } catch(e) {
    setSyncStatus('err', '연결 실패');
  }
  document.getElementById('loading').style.display = 'none';
  renderCalendar();
}

init();
</script>
</body>
</html>
